project:
  type: book
  output-dir: "_output"  
  resources: ".quarto/files"  # where figures and supporting files go

book:
  title: "Climate Classification Changes"
  subtitle: "Recent Period (2015–2024) vs WMO Climatological Reference Period"
  author: "Rick Forest"
  date: today

  chapters:
    - index.qmd
    - 01_data_acquisition.qmd
    - 02_climate_aggregation.qmd
    - 03_determinant_calculation.qmd
    - 04_climate_classification.qmd
    - 05_change_analysis.qmd

execute:
  freeze: auto
  cache: true
  cache-dir: .quarto/cache
  warning: false
  message: false

code-tools: true
code-fold: show

format:
  html:
    page-layout: full
    toc: true
    toc-location: right
    grid:
      sidebar-width: 250px
      body-width: 900px
      margin-width: 150px
      gutter-width: 1.5rem